version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: explorer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-explorer_db}
      POSTGRES_USER: ${DB_USER:-explorer_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-explorer_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-explorer_user} -d ${DB_NAME:-explorer_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: explorer_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-explorer_user}:${DB_PASSWORD:-explorer_pass}@db:5432/${DB_NAME:-explorer_db}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: explorer_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
